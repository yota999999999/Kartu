<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Kartu</title>

<style>
html,body{
    margin:0;
    padding:0;
    height:100vh;
    font-family:sans-serif;
    overflow:hidden;
    background:transparent; /* penting biar video kelihatan */
}

/* ================= BACKGROUND VIDEO ================= */
#bgVideo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:contain; /* ukuran asli */
    z-index:-1;
}

/* WRAPPER */
.wrapper{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100%;
}

/* CONTAINER */
.container{
    display:grid;
    grid-template-columns:repeat(4, 80px);
    gap:20px;
    margin-bottom:40px;
}

.kartu{
    width:80px;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:12px;
    cursor:pointer;
    overflow:hidden;
    position:relative;
    transition:0.3s;
    box-shadow:0 0 10px #ff00cc, 0 0 20px #ff00cc;
}

@keyframes getar {
    0% { transform: translate(0,0); }
    50% { transform: translate(-4px,4px); }
    100% { transform: translate(0,0); }
}

.getar{
    animation: getar 0.5s;
}

.kartu img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.nomor{
    position:absolute;
    font-size:24px;
    font-weight:bold;
    color:white;
    transition:0.4s;
}

/* tombol */
button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

/* tongkat */
#tongkat{
    position:fixed;
    width:100px;
    height:100px;
    top:80%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:999;
    cursor:grab;
    transition:filter 0.2s;
}
</style>
</head>

<body>

<!-- ================= VIDEO BACKGROUND ================= -->
<video id="bgVideo" autoplay muted loop playsinline>
    <source src="hd.mp4" type="video/mp4">
</video>

<div class="wrapper">

<div class="container" id="container"></div>

<img src="tongkat.png" id="tongkat">

<button onclick="resetGame()">Reset</button>
<button onclick="bukaSemua()">Buka Semua</button>
<button onclick="togglePower()" id="powerBtn">POWER ON</button>

</div>

<script>
const container = document.getElementById("container");

/* AUDIO */
const soundJP = new Audio("jp.mp3");
const soundMitos = new Audio("mitos1.mp3");

/* POWER */
let powerOn = true;

function togglePower(){
    powerOn = !powerOn;

    let btn = document.getElementById("powerBtn");

    if(powerOn){
        btn.innerText = "POWER ON";

        document.querySelectorAll(".kartu").forEach((k,i)=>{
            k.style.opacity = "1";
            k.style.transform = "translateY(-300px)";

            setTimeout(()=>{
                k.style.transform = "translateY(0)";
            }, i*80);
        });

        document.querySelectorAll(".nomor").forEach((n,i)=>{
            n.style.display="block";
            n.style.left="50%";
            n.style.top="-100px";

            setTimeout(()=>{
                n.style.top="50%";
                n.style.transform="translate(-50%,-50%)";
            }, i*50);
        });

    }else{
        btn.innerText = "POWER OFF";

        document.querySelectorAll(".nomor").forEach(n=>{
            n.style.left="50%";
            n.style.top="50%";
            n.style.transform="translate(-50%,-50%)";
        });

        setTimeout(()=>{
            document.querySelectorAll(".nomor").forEach(n=>{
                n.style.display="none";
            });
        },300);

        document.querySelectorAll(".kartu").forEach(k=>{
            k.style.opacity = "0";
        });

        soundJP.pause();
        soundMitos.pause();
    }
}

let hadiahList = [
    "megalodon.png","kraken.png","3tb.png","love.png",
    "el_maja.png","worm.png","kinkjeli.png","elpirate.png",
    "bone.png","grate.png","kink.png","el_retro.png"
];

let kartuData = [];
let klik = 0;

/* INIT */
function init(){
    container.innerHTML = "";
    kartuData = [...hadiahList].sort(()=>Math.random()-0.5);
    klik = 0;

    for(let i=0;i<12;i++){
        let div = document.createElement("div");
        div.className = "kartu";
        div.dataset.index = i;

        div.style.transform = "translateY(-300px)";

        let img = document.createElement("img");
        img.src = "o.png";

        let nomor = document.createElement("div");
        nomor.className = "nomor";
        nomor.innerText = i+1;

        div.appendChild(img);
        div.appendChild(nomor);

        div.onclick = ()=>bukaKartu(div);

        container.appendChild(div);

        setTimeout(()=>{
            div.style.transform = "translateY(0)";
        }, i*80);
    }
}

/* BUKA KARTU */
function bukaKartu(div){
    if(!powerOn) return;

    let i = div.dataset.index;
    let img = div.querySelector("img");
    let nomor = div.querySelector(".nomor");

    if(!img.src.includes("o.png")) return;

    klik++;

    let hadiah = kartuData[i];

    if(klik === 1 && hadiah === "love.png"){
        let indexLain;
        do{
            indexLain = Math.floor(Math.random() * kartuData.length);
        }while(kartuData[indexLain] === "love.png" || indexLain == i);

        let temp = kartuData[i];
        kartuData[i] = kartuData[indexLain];
        kartuData[indexLain] = temp;

        hadiah = kartuData[i];
    }

    div.classList.add("getar");

    setTimeout(()=>{
        img.src = hadiah;
        nomor.style.display = "none";

        if(hadiah === "love.png"){
            soundJP.currentTime = 0;
            soundJP.play();
        }else{
            soundMitos.currentTime = 0;
            soundMitos.play();
        }

        div.classList.remove("getar");
    }, 500);
}

/* BUKA SEMUA */
function bukaSemua(){
    if(!powerOn) return;

    let semua = document.querySelectorAll(".kartu");

    semua.forEach((kartu, i)=>{
        setTimeout(()=>{
            let img = kartu.querySelector("img");
            let nomor = kartu.querySelector(".nomor");

            if(img.src.includes("o.png")){
                kartu.classList.add("getar");

                setTimeout(()=>{
                    let hadiah = kartuData[i];
                    img.src = hadiah;
                    nomor.style.display = "none";
                    kartu.classList.remove("getar");
                }, 500);
            }
        }, i*120);
    });
}

/* RESET */
function resetGame(){
    if(!powerOn) return;

    let kartu = document.querySelectorAll(".kartu");

    kartu.forEach((k,i)=>{
        setTimeout(()=>{
            k.style.transform = "translateY(-300px)";
            k.style.opacity = "0";
        }, i*40);
    });

    setTimeout(()=>{
        init();
    }, 500);
}

/* ================= TONGKAT ================= */

const tongkat = document.getElementById("tongkat");

let isDrag = false;

tongkat.addEventListener("mousedown", ()=>{ if(powerOn) isDrag = true; });
document.addEventListener("mouseup", ()=> isDrag = false);

tongkat.addEventListener("touchstart", ()=>{ if(powerOn) isDrag = true; });
document.addEventListener("touchend", ()=> isDrag = false);

document.addEventListener("mousemove", e=>{
    if(!isDrag || !powerOn) return;
    moveTongkat(e.clientX, e.clientY);
});

document.addEventListener("touchmove", e=>{
    if(!isDrag || !powerOn) return;
    let t = e.touches[0];
    moveTongkat(t.clientX, t.clientY);
});

function moveTongkat(x,y){
    tongkat.style.left = x + "px";
    tongkat.style.top = y + "px";
    cekGlow();
}

function cekGlow(){
    let tongkatRect = tongkat.getBoundingClientRect();
    let semua = document.querySelectorAll(".kartu");

    let kena = false;

    semua.forEach(kartu=>{
        let rect = kartu.getBoundingClientRect();

        let tabrak = !(
            tongkatRect.right < rect.left ||
            tongkatRect.left > rect.right ||
            tongkatRect.bottom < rect.top ||
            tongkatRect.top > rect.bottom
        );

        if(tabrak){
            kena = true;
            kartu.style.transform = "scale(1.1)";
        }else{
            kartu.style.transform = "scale(1)";
        }
    });

    tongkat.style.filter = kena
        ? "drop-shadow(0 0 15px #ff00cc) drop-shadow(0 0 25px #ff00cc)"
        : "none";
}

/* ================= FORCE PLAY (HP FIX) ================= */
document.addEventListener("click", ()=>{
    document.getElementById("bgVideo").play().catch(()=>{});
});

init();
</script>

</body>
</html>
